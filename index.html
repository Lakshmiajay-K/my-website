<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajay's Website</title>

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#0f172a;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            text-align:center;
        }

        .box{
            width:500px;
            padding:30px;
            border-radius:15px;
            background:#1e293b;
            box-shadow:0 0 20px rgba(0,0,0,.4);
        }

        h1{
            color:#38bdf8;
        }

        p{
            color:#cbd5e1;
        }

        button{
            margin-top:20px;
            padding:12px 25px;
            border:none;
            border-radius:8px;
            background:#38bdf8;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0ea5e9;
        }
    </style>
</head>

<body>

<div class="box">

<h1>Hello 👋</h1>

<h2>I'm Ajay</h2>

<p>
This is my first website hosted using GitHub Pages.
</p>

<button onclick="welcome()">
Click Me
</button>

</div>

<script>

function welcome(){

alert("Welcome to my website ❤️❤️‍🔥");

}

</script>

</body>
</html>
